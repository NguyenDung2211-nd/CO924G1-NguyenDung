<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<style>
  table{
    width: 1000px ;
    height: 400px ;
  }
  table, tr , td{
    border: 1px solid black;
    border-collapse: collapse;
  }
</style>
<body>
<script>
  let sout;
  sout = `<table cellpadding='5'>`;
  for(let i = 1; i <= 10; i++){
    sout += `<tr>`;
    for(let j = 1; j <= 10; j++){
      sout += (`<td> ${i} x ${j} = ${ i * j} </td>`);
    }
    sout += `</tr>`
  }
  sout += `</table>`;
  document.write(sout);
</script>

</body>
</html>
