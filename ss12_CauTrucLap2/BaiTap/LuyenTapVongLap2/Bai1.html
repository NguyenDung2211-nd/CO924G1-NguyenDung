<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let number = 20;
  let num1 = 0;
  let num2 = 1;
  let result;
  for(let i = 1; i <= number; i++){
    result = num1 + num2;
    num1 = num2;
    num2 = result;
    document.write(result);
    document.write("<br>");
  }
</script>

</body>
</html>
