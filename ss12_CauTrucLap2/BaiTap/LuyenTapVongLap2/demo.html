<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let n = +prompt("Nhập số(0 < n < 100)");
  if(isNaN(n)) {
    while (isNaN(n)) {
      n = +prompt("Nhập lại.Chưa thỏa điều kiện(0 < n < 100)");
      if (n < 0) {
        alert("Chưa thỏa điều kiện của chúng tôi, nhập lại.");
        n = +prompt("Nhập số(0 < n < 100)");
      } else if (n > 100) {
        alert("Chưa thỏa điều kiện của chúng tôi, nhập lại.");
        n = +prompt("Nhập số(0 < n < 100)");
      }
    }
    alert("Ok, ngoan.");
  }
  else {
    while (n < 0 && n > 100) {
      if (n < 0) {
        alert("Chưa thỏa điều kiện của chúng tôi, nhập lại.");
        n = +prompt("Nhập số(0 < n < 100)");
      } else if (n > 100) {
        alert("Chưa thỏa điều kiện của chúng tôi, nhập lại.");
        n = +prompt("Nhập số(0 < n < 100)");
      }
    }
    alert("Ok, ngoan.");
  }
</script>
</body>
</html>
