<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
let sao = 7;
for(let i =1; i <= sao; i++){
   document.write("<br>");
    if(i===1) {
        for (let j = 21; j >= 1; j--) {
            document.write("*");
        }
    }
    if(i===7) {
        for (let j = 21; j >= 0; j--) {
            document.write("*");
        }
    }
    else {
        for (let j = 21; j >= 1; j--) {
            if(j === 21) {
                document.write("*");
            }
            if(j === 1) {
                document.write("*");
            }
            else{
                document.write("&nbsp&nbsp");
            }

        }
    }
}
