<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let number = 20;
  let num1 = 0;
  let num2 = 1;
  for(let i = 2; i <= number; i++){
    let result = num1 + num2;
    num1 = num2;
    num2 = result;
    if(result % 5 === 0){
      document.write(`Số đầu tiên trong dãy fibonacci chia hết cho 5 là : ${result}`);
      break;
    }
  }
</script>

</body>
</html>
