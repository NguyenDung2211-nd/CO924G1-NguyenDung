<h1>Shop Game cũng Dũng </h1>
<h2>Chào mừng bạn đến với Trò Chơi Đoán Số :)) </h2>
<b> Nhấn vào nút bên đây để bắt đầu trò chơi : </b>
<button id="batDau" onclick="doanSo">Bắt đầu</button>
<script>
document.getElementById("batDau").onclick = function doanSo() {
    let number = +prompt("Nhập khoản số bạn muốn đoán");
    while (isNaN(number) || number < 4) {
        number = +prompt("Nhập lại khoản số bạn muốn đoán (yêu cầu nhập số > 3)");
    }
    let numberDoan = +prompt("Mời bạn nhập số muốn đoán");
    while (isNaN(numberDoan)) {
        numberDoan = +prompt("Nhập lại, mời bạn nhập số muốn đoán");
   }
    let numberRandom = Math.floor(Math.random() * number);
       for(let i = 2; i <= 3; i++) {
           if(numberDoan <= 0 || isNaN(numberDoan)){
               alert(`Sai yêu cầu. Nhấn ok để đoán lượt thứ ${i} nhé. `);
               numberDoan = +prompt("Mời bạn nhập số muốn đoán");
           }
            if (numberDoan === numberRandom) {
                alert("Chúc mừng bạn đã đoán đúng, bạn thật giỏi. Bạn nhận được 500k :)) ");
                break;
            } else if (numberDoan > numberRandom) {
                alert(`Tiếc quá , số bạn đoán lớn hơn rồi. nhấn ok để đoán lượt thứ ${i} nhé.`);
                numberDoan = +prompt("Mời bạn nhập số muốn đoán");
            } else if (numberDoan < numberRandom) {
                alert(`Tiếc quá , số bạn đoán nhỏ hơn rồi. nhấn ok để đoán lượt thứ ${i} nhé.`);
                numberDoan = +prompt("Mời bạn nhập số muốn đoán");
            }
            if (i === 3) {
                alert("Bạn đã hết lượt chọn rồi. chúc bạn may mắn lần sau");
            }
        }
}
