<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let nhietDo = +prompt("Nhập nhiệt độ hiện tại của bạn");
  while(isNaN(nhietDo)) {
      nhietDo = +prompt("Bạn nhập sai yêu cầu. Mời bạn nhập lại ");
  }
    if (nhietDo > 100) {
      alert("Bạn hãy giảm nhiệt độ xuống");
    }
    else if (nhietDo < 20) {
      alert("Bạn hãy tăng nhiệt độ lên");
    }
    else {
      alert("Nhiệt độ ổn định");
    }

</script>

</body>
</html>
