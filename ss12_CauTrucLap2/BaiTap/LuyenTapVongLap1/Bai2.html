<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let nhietDo = +prompt("Nhập nhiệt độ hiện tại của bạn");
  if(isNaN(nhietDo)){
      while(isNaN(nhietDo)){
          nhietDo = +prompt("Sai yêu cầu. Nhập lại nhiệt độ hiện tại của bạn");
      }
  }
  else {
      while (nhietDo > 100 || nhietDo < 20) {
          if (nhietDo > 100) {
              alert("Bạn hãy giảm nhiệt độ xuống");
              nhietDo = +prompt("Nhập nhiệt độ hiện tại của bạn");
          } else if (nhietDo < 20) {
              alert("Bạn hãy tăng nhiệt độ lên");
              nhietDo = +prompt("Nhập nhiệt độ hiện tại của bạn");
          }
      }
      alert("Nhiệt độ ổn định");
  }

</script>

</body>
</html>
