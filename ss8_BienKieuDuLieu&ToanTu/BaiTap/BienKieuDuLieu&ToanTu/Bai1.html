<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
let ly = +prompt("Nhập điểm ly");
let hoa = +prompt("Nhập điểm hoa");
let sinh = +prompt("Nhập điểm sinh");
let dtb = (ly + hoa + sinh) / 3;
document.write(`Điểm trung bình : ${dtb} `)
dtb = ly + hoa + sinh;
document.write(`Tổng : ${dtb} `)

</script>

</body>
</html>
