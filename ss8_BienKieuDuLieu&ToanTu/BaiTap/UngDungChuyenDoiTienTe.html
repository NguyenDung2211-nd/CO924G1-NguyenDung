<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table>
    <tr>
        <th>Amount</th>
        <th>From Currency</th>
        <th>To Currency</th>
        <td></td>
    </tr>
    <tr>
        <td><input placeholder="Enter the amount" id="enter" type="text"></td>
        <td><label>
            <select id="c">
                <option value="VND">VND</option>
                <option value="USD">USD</option>
            </select>
        </label></td>
        <td><label>
            <select id="d">
                <option value="VND">VND</option>
                <option value="USD">USD</option>
            </select>
        </label></td>
        <td>
            <button id="kq" onclick="chuyenDoi">Convert</button>
        </td>
    </tr>
</table>
<p id="result"></p>
<script>
    document.getElementById("kq").onclick = function chuyenDoi() {
        let a = document.getElementById("c").value;
        let b = document.getElementById("d").value;
        let number1 = +document.getElementById("enter").value;
        let result;
        if (number1 >= 0) {
            if (a === "VND" && b === "USD") {
                result = number1 / 23000;
                document.getElementById("result").innerHTML = result + " USD";
            } else if (a === "USD" && b === "VND") {
                result = number1 * 23000;
                document.getElementById("result").innerHTML = result + " VND";
            } else if (a === "VND" && b === "VND") {
                result = number1;
                document.getElementById("result").innerHTML = result + " VND";
            } else if (a === "USD" && b === "USD") {
                result = number1;
                document.getElementById("result").innerHTML = result + " USD";
            }
        } else {
            document.getElementById("result").innerHTML = "Wrong request.";
        }

    }

</script>

</body>
</html>
