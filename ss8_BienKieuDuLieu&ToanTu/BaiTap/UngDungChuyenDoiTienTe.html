<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table>
    <tr>
        <th>Amount</th>
        <th>From Currency</th>
        <th>To Currency</th>
        <td></td>
    </tr>
    <tr>
        <td><input placeholder="Enter the amount" id="enter" type="text"></td>
        <td><label>
            <select id="c">
                <option value="VND">VND</option>
                <option value="USD">USD</option>
            </select>
        </label></td>
        <td><label>
            <select id="d">
                <option value="VND">VND</option>
                <option value="USD">USD</option>
            </select>
        </label></td>
        <td>
            <button id="kq" onclick="chuyenDoi">Convert</button>
        </td>
    </tr>
</table>
<p id="result"></p>
<script>
    document.getElementById("kq").onclick = function chuyenDoi() {
        let money1 = document.getElementById("c").value;
        let money2 = document.getElementById("d").value;
        let number = +document.getElementById("enter").value;
        let result;
        if (number >= 0) {
            if (money1 === "VND" && money2 === "USD") {
                result = number / 23000;
                document.getElementById("result").innerHTML = result + " USD";
            } else if (money1 === "USD" && money2 === "VND") {
                result = number * 23000;
                document.getElementById("result").innerHTML = result + " VND";
            } else if (money1 === "VND" && money1 === "VND") {
                result = number;
                document.getElementById("result").innerHTML = result + " VND";
            } else if (money1 === "USD" && money2 === "USD") {
                result = number;
                document.getElementById("result").innerHTML = result + " USD";
            }
        } else {
            document.getElementById("result").innerHTML = "Wrong request.";
        }

    }

</script>

</body>
</html>
