<script>
  class Person{
    name;
    age;
    constructor(name, age){
      this.name = name;
      this.age = age;
    }
    greet(){
      document.write(`Hello, my name is ${this.name} and I am ${this.age} year old`);
    }
  }
  let person1 = new Person('Dũng', 20);
  person1.greet();
</script>
