  class Human{

    }

    }
    eatApple(apple){
        if(apple.weight > 0){
            apple.decreaseApple();
            this.weight++;
            console.log(`${this.name} đã ăn táo. Cân nặng hiện tại là ${this.weight}`);
        }else{
            console.log(`Hết táo`);
        }
    }
      checkAppleWeight(apple) {
          console.log(`Khối lượng của quả táo: ${apple.weight}`);
      }
  }


  class Apple{
    weight;
    constructor(weight){
      this.weight = 10;
    }

    }

      }
    }
    decreaseApple(){
      if(this.isEmpty()){
        alert(`Hết táo`);
      }else{
        this.weight--;
      }
    }
  }


  let apple = new Apple();
  let human = new Human("Adam", "Nam", 70);
