<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let arr = [1,11,-2,22,-4,5,7,26,2,9];
  let index = 0;
  for(let i = 0; i < arr.length; i++){
    if(arr[i] < 0){
      document.write(`${arr[i]} <br>`);
      index += 1;
    }
  }
  document.write(`Có ${index} số nguyên âm`);
</script>
</body>
</html>
