<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    function nhap() {
        let number1 = ["d", "s", "d", "a", "d"];
        let kiTu = prompt("Nhập 1 kí tự bất kì để kiểm tra");
        let result = kiemTraKiTu(number1, kiTu);
        return `${result}`;
    }

    function kiemTraKiTu(number1, kiTu) {
        let count = 0;
        for (let i = 0; i < number1.length; i++) {
            if (number1[i] === kiTu) {
                count += 1;
            }
        }
        if (count > 0) {
            return `kí tự ${kiTu} có trong mảng và có ${count} lần xuất hiện`;
        } else {
            return `Kí tự ${kiTu} không có trong mảng. -1`;
        }
    }

    alert(nhap());

</script>
</body>
</html>
