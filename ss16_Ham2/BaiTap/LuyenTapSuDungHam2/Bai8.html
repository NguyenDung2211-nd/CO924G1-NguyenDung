<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let number = [];

    function truyenMangSoNguyen() {
        for (let i = 1; i <= 6; i++) {
            number[i] = +prompt(`Nhập một mảng số nguyên (nhập lần lượt 6 số).`);
            if(isNaN(number[i]) || !Number.isInteger(number[i])){
                return `Sai yêu cầu.`;
            }
        }
    number.reverse();
    return `Mảng đã được đảo ngược : number = [${number}]`;
    }

    alert(truyenMangSoNguyen());
</script>
</body>
</html>
