<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    function nhap(){
        let number = [];
        for (let i = 1; i <= 6; i++) {
            number[i] = +prompt(`Nhập một mảng số nguyên (nhập lần lượt 6 số).`);
            if(isNaN(number[i]) || !Number.isInteger(number[i])){
                return `Sai yêu cầu.`;
            }
        }
        let result = truyenMangSoNguyen(number);
        return `Mảng đã được đảo ngược : number = [${result}]`;
    }

    function truyenMangSoNguyen(number) {
    number.reverse();
    return number;
    }

    alert(nhap());
</script>
</body>
</html>
