<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>$Title$</title>
</head>
<body>
<script>

    function nhap() {
        let number = +prompt("Nhập số");
        while (isNaN(number) || number < 1) {
            number = +prompt("Sai yêu cầu .Nhập số");
        }
        let result = giaiThua(number);
        document.write(`Giai thừa của ${number} = ${result}`);
    }

    function giaiThua(number) {
        let total = 1;
        let i = 1
        while (i <= number) {
            total = total * i;
            i++;
        }
        return ` ${total}`;
    }

    nhap();
</script>
</body>
</html>
