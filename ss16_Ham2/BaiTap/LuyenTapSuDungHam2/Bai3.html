<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>$Title$</title>
</head>
<body>
<script>
    let total = 1;
    let number;
    function giaiThua(){
        number = +prompt("Nhập số");
        while(isNaN(number) || number < 1){
            number = +prompt("Sai yêu cầu .Nhập số");
        }
        let i = 1
        while(i <= number){
            total = total * i;
            i++;
        }
        return `Giai thừa của ${number} = ${total}`;
    }
    alert(giaiThua());
</script>
</body>
</html>
