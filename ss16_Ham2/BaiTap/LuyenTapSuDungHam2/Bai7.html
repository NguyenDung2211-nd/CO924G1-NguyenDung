<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function nhap() {
        let number1 = +prompt("Nhập số thứ 1");
        while (isNaN(number1)) {
            number1 = +prompt("Sai yêu cầu. Nhập lại số thứ 1");
        }
        let number2 = +prompt("Nhập số thứ 2");
        while (isNaN(number2)) {
            number2 = +prompt("Sai yêu cầu. Nhập lại số thứ 2");
        }
        let result = doiSo(number1, number2);
        document.write(result);
    }

    function doiSo(number1, number2,) {
        let number3 = number1;
        number1 = number2;
        number2 = number3;
        return `${number1} ${number2}`;
    }

    nhap();

</script>
</body>
</html>
