<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    function nhap(){
        let number = prompt("Nhập vào đây để kiểm tra có phải là kí tự số không.");
        let result = kiemTraKiTu(number);
        if(result){
            return true;
        }else{
            return false;
        }
    }

    function kiemTraKiTu(number) {
        if (!isNaN(number)) {
            return true;
        }
    }

    alert(nhap());
</script>
</body>
</html>
