<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

  function isPrime(number) {
        let isPrime = true;
        for (let i = 2; i <= Math.sqrt(number); i++) {
            if (number % i === 0) {
                isPrime = false;
                break;
            }
        }
        return isPrime;
    }

    function displayPrime100(){
      for(let number = 2; number <= 100; number++){
          if(isPrime(number)){
              document.write(`${number} là số nguyên tố <br>`);
          }
      }
    }

    function checkIsPrime() {
        let number = +prompt("Mời nhập số để kiểm tra");
        while (isNaN(number) || number < 2 || number % 1 !== 0) {
            number = +prompt("Sai yêu cầu .Mời nhập lại số để kiểm tra");
        }
        if (isPrime(number)) {
            alert(`${number} là số nguyên tố`);
        } else {
            alert(`${number} không phải là số nguyên tố`);
        }
    }
  checkIsPrime();

</script>
</body>
</html>
