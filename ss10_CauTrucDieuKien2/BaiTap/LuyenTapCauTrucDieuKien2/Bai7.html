<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let a = +prompt("Nhập a");
  let b = +prompt("Nhập b");
  let c = +prompt("Nhập c");
  let delta;
  if(isNaN(a) || isNaN(b) || isNaN(c)){
    alert("Sai yêu cầu");
  }
  else if(a === 0){
      if(b === 0 && c === 0){
          alert("Phương trình vô số nghiệm");
      }
      else if(b === 0 && c !== 0){
          alert("Phương trình vô nghiệm");
      }
      else if(b !== 0 ){
          let x = (-c) / b;
          alert("x = " + x);
      }
  }
  else{
      delta = (b * b)-4 * a * c;
    if(delta < 0){
      alert("Phương trình vô nghiệm");
    }
    else if(delta === 0){
      let x = (-b) / (2 * a);
      alert("Phương trình có 1 nghiệm kép x = " + x);
    }
    else if(delta > 0){
      let x1 = ((-b) + Math.sqrt(delta)) /2 * a;
      let x2 = ((-b) - Math.sqrt(delta)) /2 * a;
      alert("x1 = : "+x1 +"   x2 = "+x2);
    }
  }
</script>
</body>
</html>
