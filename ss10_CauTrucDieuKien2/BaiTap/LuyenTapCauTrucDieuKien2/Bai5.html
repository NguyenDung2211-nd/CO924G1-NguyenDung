<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let a = +prompt("Enter a");
    let b = +prompt("Enter b");
    let s;
    if(isNaN(a) || isNaN(b) || a <= 0 || b <= 0){
        alert("Wrong request");
    }
    else {
        s = 1/2 * a * b;
        alert("S = "+ s + " cm^2");
    }
</script>

</body>
</html>
