<script>
  let a = +prompt("Enter a")
  let b = +prompt("Enter b")
  let c = +prompt("Enter c")
  if (isNaN(a) || isNaN(b) || isNaN(c) || a <= 0 || b <= 0 || c <= 0 || (a + b) <= c || (b + c) <= a || (a + c) <= b) {
    alert("Wrong request");
  }
  else {
      alert("a,b,c are the edges of a triangle");
  }
</script>
