<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Kiểm tra số ngày trong tháng</h1>
<input id="enter" type="text">
<button id="click" onclick="checkDay">Check</button><br><br>
<p id="result"></p>
<script>
  document.getElementById("click").onclick = function checkDay(){
    let month = +document.getElementById("enter").value;
      switch (month) {
        case 1:
        case 3:
        case 5:
        case 7:
        case 8:
        case 10:
        case 12:
          document.getElementById("result").innerHTML = "Tháng " + month + " có 31 ngày.";
          break;
        case 4:
        case 6:
        case 9:
        case 11:
          document.getElementById("result").innerHTML = "Tháng " + month + " có 30 ngày.";
          break;
        case 2:
          document.getElementById("result").innerHTML = "Tháng " + month + " có 28 ngày hoặc 29 ngày.";
          break;
        default:
          document.getElementById("result").innerHTML = "Wrong request.";
      }
  }
</script>
</body>
</html>
